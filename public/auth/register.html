<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>انضم إلينا </title>
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;600;700;800&display=swap">
    <link rel="stylesheet" href="/auth/register.css">
</head>

<body>

    <div class="page-container">
        <div class="content-wrapper">

            <a href="/" class="logo">

                <!-- <i class="fa-solid fa-spa" style="color:#c8a96a; font-size:34px;"></i> -->


                <svg width="50" height="60" viewBox="0 0 120 90" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <g stroke="#D4AF37" stroke-width="2.5" fill="none">

                        <!-- الورقة الوسطى -->
                        <path d="M60 10 C45 35 50 60 60 80 C70 60 75 35 60 10Z" />

                        <!-- ورقتان داخليتان -->
                        <path d="M40 25 C35 45 40 65 55 80 C58 55 52 40 40 25Z" />
                        <path d="M80 25 C68 40 62 55 65 80 C80 65 85 45 80 25Z" />

                        <!-- ورقتان خارجيتان -->
                        <path d="M20 30 C15 55 30 75 55 80 C40 55 30 40 20 30Z" />
                        <path d="M100 30 C90 40 80 55 65 80 C90 75 105 55 100 30Z" />

                        <!-- الأوراق السفلية -->
                        <path d="M5 55 C20 50 40 55 60 80 C35 80 15 70 5 55Z" />
                        <path d="M115 55 C105 70 85 80 60 80 C80 55 100 50 115 55Z" />

                    </g>

                </svg>

                <div class="logo-text">
                    <h2>Lavender</h2>
                    <span>Beauty Clinic</span>
                </div>

            </a>

            <div class="header-section">
                <h1 class="main-title">انضم إلى <span class="special">Lavender</span>.</h1>
                <p class="subtitle">أخبرنا من أنت — لنخصّص تجربتك.</p>
            </div>

            <form class="register-form" id="registerForm">

                <div class="roles-section">
                    <label class="section-label">أنضمّ بصفة</label>
                    <div class="roles-grid">

                        <button type="button" class="role-card active" data-role="patient">
                            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"
                                fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                stroke-linejoin="round" class="card-icon">
                                <path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"></path>
                                <circle cx="12" cy="7" r="4"></circle>
                            </svg>
                            <div class="card-title">مريض/ة</div>
                            <div class="card-desc">حجز العلاجات ومراجعة السجل</div>
                        </button>

                        <button type="button" class="role-card" data-role="doctor">
                            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"
                                fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                stroke-linejoin="round" class="card-icon">
                                <path d="M11 2v2"></path>
                                <path d="M5 2v2"></path>
                                <path d="M5 3H4a2 2 0 0 0-2 2v4a6 6 0 0 0 12 0V5a2 2 0 0 0-2-2h-1"></path>
                                <path d="M8 15a6 6 0 0 0 12 0v-3"></path>
                                <circle cx="20" cy="10" r="2"></circle>
                            </svg>
                            <div class="card-title">طبيب/ة</div>
                            <div class="card-desc">إدارة الجلسات والوصفات</div>
                        </button>

                        <button type="button" class="role-card" data-role="receptionist">
                            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"
                                fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                stroke-linejoin="round" class="card-icon">
                                <path d="M3 20a1 1 0 0 1-1-1v-1a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v1a1 1 0 0 1-1 1Z"></path>
                                <path d="M20 16a8 8 0 1 0-16 0"></path>
                                <path d="M12 4v4"></path>
                                <path d="M10 4h4"></path>
                            </svg>
                            <div class="card-title">استقبال</div>
                            <div class="card-desc">الجدولة وسجلات المرضى</div>
                        </button>

                        <button type="button" class="role-card" data-role="manager">
                            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"
                                fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                stroke-linejoin="round" class="card-icon">
                                <path d="M3 3v16a2 2 0 0 0 2 2h16"></path>
                                <path d="M18 17V9"></path>
                                <path d="M13 17V5"></path>
                                <path d="M8 17v-3"></path>
                            </svg>
                            <div class="card-title">مدير/ة</div>
                            <div class="card-desc">المالية والمخزون والموظفون</div>
                        </button>

                    </div>
                </div>

                <div class="inputs-grid">

                    <div class="input-field-group">
                        <label for="name">الاسم الكامل</label>
                        <input type="text" id="name" placeholder="هدى حسن" required>
                    </div>

                    <div class="input-field-group">
                        <label for="email">البريد الإلكتروني</label>
                        <input type="email" id="email" placeholder="you@example.com" required>
                    </div>

                    <div class="input-field-group">
                        <label for="password">كلمة المرور</label>
                        <input type="password" id="password" placeholder="••••••••" required>
                    </div>

                    <div class="input-field-group">
                        <label for="phone">رقم الجوال</label>
                        <input type="text" id="phone" placeholder="+966 5X XXX XXXX" dir="ltr" required>
                    </div>
                    <div class="input-field-group">
                        <label>الجنس</label>
                        <div class="gender-selection-wrapper" style="display: flex; gap: 15px; margin-top: 8px;">

                            <label class="gender-card" style="flex: 1; cursor: pointer;">
                                <input type="radio" name="gender" value="female" required style="margin-left: 5px;">
                                <span>أنثى</span>
                            </label>

                            <label class="gender-card" style="flex: 1; cursor: pointer;">
                                <input type="radio" name="gender" value="male" required style="margin-left: 5px;">
                                <span>ذكر</span>
                            </label>

                        </div>
                    </div>

                </div>

                <div class="form-actions">
                    <button type="submit" class="primary-submit-btn" id="submitBtn">إنشاء ملفي</button>
                    <p class="footer-login-text">
                        لديك حساب؟ <a href="/login" class="login-link-inline">سجّلي الدخول</a>
                    </p>
                </div>

            </form>

        </div>
    </div>

</body>
<script src="/auth/register.js"></script>

</html>
