<html lang="ar" dir="rtl">

<head>
    <!-- إعدادات الصفحة -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Lavender Beauty Clinic</title>

    <link rel="stylesheet" href="sessions.css">
    <link rel="stylesheet" href="../component/toast.css">
    <link rel="stylesheet" href="../component/cancelModel.css">
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🪻</text></svg>">

</head>


<body>

    <!-- ================= HEADER ================= -->
    <header>

        <div class="header-right">

            <!-- زر القائمة للموبايل -->
            <button class="menu-toggle" aria-label="فتح القائمة">
                ☰
            </button>


            <!-- الشعار -->
            <a href="../auth/home.html" class="logo">

                <svg width="50" height="60" viewBox="0 0 120 90" fill="none" xmlns="http://www.w3.org/2000/svg">

                    <g stroke="#D4AF37" stroke-width="2.5" fill="none">

                        <path d="M60 10 C45 35 50 60 60 80 C70 60 75 35 60 10Z"></path>

                        <path d="M40 25 C35 45 40 65 55 80 C58 55 52 40 40 25Z"></path>

                        <path d="M80 25 C68 40 62 55 65 80 C80 65 85 45 80 25Z"></path>

                        <path d="M20 30 C15 55 30 75 55 80 C40 55 30 40 20 30Z"></path>

                        <path d="M100 30 C90 40 80 55 65 80 C90 75 105 55 100 30Z"></path>

                        <path d="M5 55 C20 50 40 55 60 80 C35 80 15 70 5 55Z"></path>

                        <path d="M115 55 C105 70 85 80 60 80 C80 55 100 50 115 55Z"></path>

                    </g>

                </svg>


                <!-- نص الشعار -->
                <div class="logo-text">

                    <h2>Lavender</h2>

                    <span>
                        Beauty Clinic
                    </span>

                </div>


            </a>

        </div>

    </header>

    <!-- END HEADER -->


    <!-- ================= MAIN WRAPPER ================= -->

    <div class="main-wrapper">


        <!-- ================= SIDEBAR ================= -->

        <aside>

            <!-- زر إغلاق القائمة -->

            <div class="sidebar-top">
                <button class="close-menu">
                    ✕
                </button>

            </div>

            <nav>

                <ul>


                    <!-- الصفحة الرئيسية -->

                    <li>

                        <a href="home.html">


                            <span class="icon-nav">

                                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"
                                    fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                    stroke-linejoin="round">


                                    <rect width="7" height="9" x="3" y="3" rx="1"></rect>

                                    <rect width="7" height="5" x="14" y="3" rx="1"></rect>

                                    <rect width="7" height="9" x="14" y="12" rx="1"></rect>

                                    <rect width="7" height="5" x="3" y="16" rx="1"></rect>


                                </svg>

                            </span>


                            <span>
                                نظرة عامة
                            </span>


                        </a>

                    </li>




                    <!-- الجلسات -->

                    <li class="active">

                        <a href="sessions.html">


                            <span class="icon-nav">


                                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"
                                    fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                    stroke-linejoin="round">


                                    <path d="M11 2v2"></path>

                                    <path d="M5 2v2"></path>

                                    <path d="M5 3H4a2 2 0 0 0-2 2v4a6 6 0 0 0 12 0V5a2 2 0 0 0-2-2h-1"></path>

                                    <path d="M8 15a6 6 0 0 0 12 0v-3"></path>

                                    <circle cx="20" cy="10" r="2"></circle>


                                </svg>


                            </span>


                            <span>
                                الجلسات
                            </span>


                        </a>

                    </li>




                    <!-- المرضى -->

                    <li>

                        <a href="pateins.html">


                            <span class="icon-nav">


                                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"
                                    fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                    stroke-linejoin="round">


                                    <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"></path>

                                    <path d="M16 3.128a4 4 0 0 1 0 7.744"></path>

                                    <path d="M22 21v-2a4 4 0 0 0-3-3.87"></path>

                                    <circle cx="9" cy="7" r="4"></circle>


                                </svg>


                            </span>


                            <span>
                                المرضى
                            </span>


                        </a>


                    </li>





                    <!-- الملف الشخصي -->

                    <li>


                        <a href="profile.html">


                            <span class="icon-nav">


                                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"
                                    fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                    stroke-linejoin="round">


                                    <path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"></path>

                                    <circle cx="12" cy="7" r="4"></circle>


                                </svg>


                            </span>


                            <span>
                                الملف الشخصي
                            </span>


                        </a>


                    </li>


                </ul>


            </nav>


        </aside>


        <!-- END SIDEBAR -->




        <!-- ================= MAIN CONTENT ================= -->

        <main>


            <!-- الترحيب -->

            <div class="welcome-section">


                <h1>
                    الجلسات النشطة
                    <span id="patientName"></span>
                </h1>
                <p>
                    إدارة مواعيد اليوم، تسجيل المواد، وإصدار الوصفات.
                </p>


            </div>
            <!-- ================= ACTIVE SESSIONS ================= -->

            <div class="sessions-container" id="sessionsContainer">
                <p style="text-align: center; color: #888;">جاري تحميل الجلسات...</p>
            </div>


        </main>

    </div>

    <div id="cancelModal" class="modal">
        <div class="modal-content">
            <span class="close-btn" id="closeModalBtn">&times;</span>

            <div class="modal-body">

                <h3 class="modal-title">هل تود إلغاء موعد المريض؟</h3>
                <p class="modal-subtitle">الرجاء كتابه السبب لاعلام المريض
                 </p>

                <form id="cancelAppointmentForm">
                    <div class="form-group">
                        <textarea id="cancellation_reason" name="cancellation_reason" rows="3"
                            placeholder=""></textarea>
                    </div>

                    <div class="modal-footer">
                        <button type="button" id="backModalBtn" class="back-btn">تراجع</button>
                        <button type="button" id="confirmCancelBtn" class="cancel-btn">تأكيد الإلغاء</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
    <div id="toastNotification"
        style="display: none; position: fixed; bottom: 20px; left: 20px; background: #28a745; color: white; padding: 15px 25px; border-radius: 5px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); z-index: 1001; direction: rtl; font-weight: bold;">
        ✓ تم إلغاء الموعد بنجاح.
    </div>
    <script>
        const menuToggle = document.querySelector('.menu-toggle');
        const closeMenu = document.querySelector('.close-menu');
        const sidebar = document.querySelector('aside');

        menuToggle.addEventListener('click', (e) => {
            sidebar.classList.toggle('open');
            e.stopPropagation(); // لمنع تضارب الحدث مع إغلاق القائمة عند الضغط بالخارج
        });

        closeMenu.addEventListener('click', () => {
            sidebar.classList.remove('open');
        });

        document.addEventListener('click', (e) => {
            if (!sidebar.contains(e.target) && sidebar.classList.contains('open')) {
                sidebar.classList.remove('open');
            }
        });

    </script>
    <script src="sessions.js"></script>
    <script src="../component/cancelModel.js"></script>
</body>

</html>
