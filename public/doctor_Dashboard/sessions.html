    <!-- نافذة تأكيد الإلغاء -->
    <div id="cancelModal" class="modal">
        <div class="modal-content">
            <h3>هل أنت متأكد؟</h3>
            <p>هل تريد حقاً إلغاء هذه الجلسة؟ لا يمكن التراجع عن هذا الإجراء.</p>
            <div class="modal-actions">
                <button id="confirmCancel" class="confirm-btn">نعم، قم بالإلغاء</button>
                <button id="closeModal" class="close-modal-btn">تراجع</button>
            </div>
        </div>
    </div>
    <script>
        // --- كود القائمة الجانبية الموجود مسبقاً ---
        const menuBtn = document.querySelector(".menu-toggle");
        const closeBtn = document.querySelector(".close-menu");
        const sidebar = document.querySelector("aside");

        menuBtn.addEventListener("click", () => {
            sidebar.classList.add("open");
        });

        closeBtn.addEventListener("click", () => {
            sidebar.classList.remove("open");
        });

        // --- كود نافذة تأكيد الإلغاء الجديد ---
        const cancelButtons = document.querySelectorAll('.cancel-btn');
        const modal = document.getElementById('cancelModal');
        const confirmCancelBtn = document.getElementById('confirmCancel');
        const closeModalBtn = document.getElementById('closeModal');

        let sessionCardToRemove = null; // متغير لحفظ الكرت المراد حذفه

        // عند الضغط على زر "إلغاء الجلسة" في أي كرت
        cancelButtons.forEach(button => {
            button.addEventListener('click', function () {
                sessionCardToRemove = this.closest('.session-card'); // تحديد الكرت الحالي
                modal.classList.add('show'); // إظهار النافذة
            });
        });

        // عند الضغط على زر "تراجع"
        closeModalBtn.addEventListener('click', () => {
            modal.classList.remove('show');
            sessionCardToRemove = null;
        });

        // عند الضغط على زر "نعم، قم بالإلغاء"
        confirmCancelBtn.addEventListener('click', () => {
            if (sessionCardToRemove) {
                // إضافة تأثير اختفاء بسيط ثم حذف العنصر (اختياري لكن يضيف لمسة احترافية)
                sessionCardToRemove.style.opacity = '0';
                setTimeout(() => {
                    sessionCardToRemove.remove(); // حذف الكرت من الصفحة
                }, 300);
            }
            modal.classList.remove('show'); // إخفاء النافذة
            sessionCardToRemove = null;
        });

        // إغلاق النافذة إذا قام المستخدم بالنقر خارج المربع الأبيض
        window.addEventListener('click', (e) => {
            if (e.target === modal) {
                modal.classList.remove('show');
                sessionCardToRemove = null;
            }
        });
    </script>
    <script src="sessions.js"></script>
