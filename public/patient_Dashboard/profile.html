<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Lavender Beauty Clinic</title>

    <link rel="stylesheet" href="home.css">
    <link rel="stylesheet" href="profile.css">
    <meta name="csrf-token" content="{{ csrf_token() }}">
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🪻</text></svg>">
</head>

<body>

    <header>
        <div class="header-right">
            <button class="menu-toggle" aria-label="فتح القائمة">☰</button>

            <a href="../auth/home.html" class="logo">
                <svg width="50" height="60" viewBox="0 0 120 90" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <g stroke="#D4AF37" stroke-width="2.5" fill="none">
                        <path d="M60 10 C45 35 50 60 60 80 C70 60 75 35 60 10Z" />
                        <path d="M40 25 C35 45 40 65 55 80 C58 55 52 40 40 25Z" />
                        <path d="M80 25 C68 40 62 55 65 80 C80 65 85 45 80 25Z" />
                        <path d="M20 30 C15 55 30 75 55 80 C40 55 30 40 20 30Z" />
                        <path d="M100 30 C90 40 80 55 65 80 C90 75 105 55 100 30Z" />
                        <path d="M5 55 C20 50 40 55 60 80 C35 80 15 70 5 55Z" />
                        <path d="M115 55 C105 70 85 80 60 80 C80 55 100 50 115 55Z" />
                    </g>
                </svg>
                <div class="logo-text">
                    <h2>Lavender</h2>
                    <span>Beauty Clinic</span>
                </div>
            </a>
        </div>

    </header>

    <div class="main-wrapper">
        <aside>
            <button class="close-menu">✕</button>
            <nav>
                <ul>
                    <li><a href="home.html"><span class="icon-nav"><svg xmlns="http://www.w3.org/2000/svg" width="24"
                                    height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                                    stroke-linecap="round" stroke-linejoin="round"
                                    class="lucide lucide-layout-dashboard h-4 w-4" aria-hidden="true">
                                    <rect width="7" height="9" x="3" y="3" rx="1"></rect>
                                    <rect width="7" height="5" x="14" y="3" rx="1"></rect>
                                    <rect width="7" height="9" x="14" y="12" rx="1"></rect>
                                    <rect width="7" height="5" x="3" y="16" rx="1"></rect>
                                </svg></span><span>نظرة عامة</span></a></li>
                    <li><a href="ratings.html"> <span class="icon-nav"><svg width="20" height="20" viewBox="0 0 24 24"
                                    fill="none" xmlns="http://www.w3.org/2000/svg" stroke="currentColor"
                                    stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
                                    <polygon
                                        points="12 7 13.5 9.8 16.5 10.3 14.3 12.2 15 15.2 12 13.7 9 15.2 9.7 12.2 7.5 10.3 10.5 9.8">
                                    </polygon>
                                </svg></span><span>التقييمات</span></a></li>
                    <li>
                        <a href="treatments.html">
                            <span class="icon-nav">
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none"
                                    xmlns="http://www.w3.org/2000/svg" stroke="currentColor" stroke-width="2"
                                    stroke-linecap="round" stroke-linejoin="round">
                                    <path
                                        d="M9 2C9 5.5 12.5 9 16 9C12.5 9 9 12.5 9 16C9 12.5 5.5 9 2 9C5.5 9 9 5.5 9 2Z" />
                                    <path
                                        d="M18 14C18 15.5 19.5 17 21 17C19.5 17 18 18.5 18 20C18 18.5 16.5 17 15 17C16.5 17 18 15.5 18 14Z" />
                                    <path
                                        d="M19 3C19 3.5 19.5 4 20 4C19.5 4 19 4.5 19 5C19 4.5 18.5 4 18 4C18.5 4 19 3.5 19 3Z" />
                                </svg>
                            </span>
                            <span>الخدمات</span>
                        </a>
                    </li>
                    <li><a href="bills.html"><span class icon-nav><svg xmlns="http://www.w3.org/2000/svg" width="20"
                                    height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                                    stroke-linecap="round" stroke-linejoin="round">
                                    <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                                    <polyline points="14 2 14 8 20 8"></polyline>
                                    <line x1="16" y1="13" x2="8" y2="13"></line>
                                    <line x1="16" y1="17" x2="8" y2="17"></line>
                                    <polyline points="10 9 9 9 8 9"></polyline>
                                </svg>
                            </span><span> الفواتير الشخصية</span></a></li>
                    <li class="active"><a href="profile.html"><span class icon-nav><svg
                                    xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"
                                    fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                    stroke-linejoin="round" class="lucide lucide-user h-4 w-4" aria-hidden="true">
                                    <path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"></path>
                                    <circle cx="12" cy="7" r="4"></circle>
                                </svg></span><span>الملف الشخصي</span></a></li>
                </ul>
            </nav>
        </aside>
        <main>
            <div class="profile-container">

                <div class="profile-header">
                    <div class="avatar-section">
                        <div class="avatar-circle" id="userInitials">م</div>
                        <div class="avatar-info">
                            <h3 id="patientHeaderName">مريضة لافندر</h3>
                            <span class="role-badge" id="userRoleBadge">مريضة</span>
                        </div>
                    </div>
                    <h1>ملفكِ الشخصي</h1>
                    <p>إدارة بياناتكِ الصحية والشخصية في عيادة لافندر</p>
                </div>

                <form id="profileForm">
                    <div class="form-grid">

                        <div class="form-group">
                            <label class="form-label" for="name">الاسم الكامل</label>
                            <input type="text" id="name" name="name" class="form-input" placeholder="أدخلي اسمكِ الكامل"
                                required>
                        </div>

                        <div class="form-group">
                            <label class="form-label" for="phone">رقم الجوال</label>
                            <input type="tel" id="phone" name="phone" class="form-input" placeholder="+966 5X XXX XXXX"
                                required>
                        </div>

                        <div class="form-group">
                            <label class="form-label" for="email">البريد الإلكتروني (حساب الدخول)</label>
                            <input type="email" id="email" class="form-input"
                                style="background-color: #f5f5f5; cursor: not-allowed;" readonly>
                        </div>

                        <div class="form-group">
                            <label class="form-label" for="genderStatic">الجنس</label>
                            <input type="text" id="genderStatic" class="form-input"
                                style="background-color: #f5f5f5; cursor: not-allowed;" readonly>
                        </div>

                        <div class="form-group">
                            <label class="form-label" for="birthdate">تاريخ الميلاد</label>
                            <input type="date" id="birthdate" name="birthdate" class="form-input">
                        </div>

                        <div class="form-group full-width">
                            <label class="form-label" for="address">العنوان</label>
                            <input type="text" id="address" name="address" class="form-input"
                                placeholder="المدينة، الحي، الشارع">
                        </div>

                        <div class="form-group full-width">
                            <label class="form-label" for="medical_notes">الملاحظات الطبية والحساسية</label>
                            <textarea id="medical_notes" name="medical_notes" class="form-textarea"
                                placeholder="هل تعانين من حساسية تجاه أدوية أو مواد معينة؟ اذكريها هنا..."></textarea>
                        </div>

                    </div>

                    <div class="actions-section">
                        <button type="submit" class="btn-submit">حفظ التعديلات</button>
                    </div>
                </form>

            </div>
        </main>
    </div>
    <div id="toast" class="toast">تم تحديث ملفكِ الشخصي بنجاح!</div>

    <script>
        const menuToggle = document.querySelector('.menu-toggle');
        const closeMenu = document.querySelector('.close-menu');
        const sidebar = document.querySelector('aside');

        // فتح وإغلاق القائمة عند الضغط على زر الهامبرغر
        menuToggle.addEventListener('click', (e) => {
            sidebar.classList.toggle('open');
            e.stopPropagation(); // لمنع تضارب الحدث مع إغلاق القائمة عند الضغط بالخارج
        });

        // إغلاق القائمة عند الضغط على زر إكس (✕)
        closeMenu.addEventListener('click', () => {
            sidebar.classList.remove('open');
        });

        // ميزة إضافية: إغلاق القائمة تلقائياً عند الضغط في أي مكان خارجها (UX ممتاز)
        document.addEventListener('click', (e) => {
            if (!sidebar.contains(e.target) && sidebar.classList.contains('open')) {
                sidebar.classList.remove('open');
            }
        });
    </script>
    <script src="profile.js"></script>
</body>

</html>
