        <div class="service-price-card">
            <div class="price-header">
                <span class="price-label" id="price-status-label">السعر</span>
                <div class="price-container">
                    <span class="price-old-detail" style="display: none;"></span>
                    <div class="price-amount"><span class="price-num">0</span> <span class="currency">ل.س</span></div>
                </div>
            </div>

            <div class="duration-badge">
                <span class="clock-icon">🕒</span> <span id="duration-text"> دقيقة</span>
            </div>

            <button class="book-now-btn">احجزي الآن</button>
            <p class="note-text">ستتم استشارتك قبل تحديد موعد أي علاج.</p>
        </div>

    </div>
    <div class="reviews-section">
        <div class="reviews-head">
            <h2 class="reviews-title">آراء العميلات</h2>
            <div id="average_rating">
                <h5>
                    متوسط التقييم:
                </h5>
            </div>

                    </div>

                    التجربة.
                </p>

        </div>
    </div>
    <div class="booking-modal-overlay" id="bookingModal">
        <div class="booking-modal-card">

            <div class="modal-header">
                <h3>احجزي موعدكِ الآن - <span id="modal-service-name">فيلر شفايف</span></h3>
                <button class="close-modal-btn" id="closeModalBtn" title="إغلاق">&times;</button>
            </div>

            <form class="modal-form" id="appointmentForm">

                <div class="patient-identity">
                    <i class="far fa-user-circle"></i>
                    <span>المريضة: <strong id="logged-in-patient-name">سارة أحمد</strong></span>
                </div>

                <div class="form-group">
                    <label for="doctor-select">اختر الطبيبة</label>
                    <div class="select-wrapper">
                        <select id="doctor-select" required>
                            <option value="" disabled selected>اختر الطبيبة المتخصصة...</option>
                            <option value="1">د. مريم - متخصصة حقن وتجميل</option>
                            <option value="2">د. ليلى - أخصائية جلدية وعناية بالبشرة</option>
                        </select>
                    </div>
                </div>
                <div class="form-group">
                    <label for="booking-notes"> كود الخصم :</label>
                    <input type="text" id="promoCode" placeholder="000000">
                </div>


                <div class="form-row">
                    <div class="form-group flex-1">
                        <label for="booking-date">اختر التاريخ</label>
                        <input type="date" id="booking-date" required>
                    </div>

                    <div class="form-group flex-1">
                        <label for="booking-time">اختر الوقت</label>
                        <input type="time" id="booking-time" required>
                    </div>
                </div>



                <div class="modal-actions">
                    <button type="submit" class="confirm-booking-btn">تأكيد الحجز</button>
                    <button type="button" class="cancel-booking-btn" id="cancelModalBtn">إلغاء</button>
                </div>
            </form>

        </div>
    </div>
