</head>

<body>

    <header>
        <div class="header-right">
            <button class="menu-toggle" aria-label="فتح القائمة">☰</button>

            <a href="../auth/home.html" class="logo">

                        <path d="M80 25 C68 40 62 55 65 80 C80 65 85 45 80 25Z"></path>
                        <path d="M20 30 C15 55 30 75 55 80 C40 55 30 40 20 30Z"></path>
                        <path d="M100 30 C90 40 80 55 65 80 C90 75 105 55 100 30Z"></path>
                        <path d="M5 55 C20 50 40 55 60 80 C35 80 15 70 5 55Z"></path>
                        <path d="M115 55 C105 70 85 80 60 80 C80 55 100 50 115 55Z"></path>
                    </g>
                </svg>
                <div class="logo-text">
                    <h2>Lavender</h2>
                    <span>Beauty Clinic</span>
                </div>
            </a>
        </div>
    </header>
    <!-- end header -->
    <div class="main-wrapper">
        <aside>
            <button class="close-menu">✕</button>
            <nav>
                <ul>
                    <li ><a href="home.html"><span class="icon-nav">
                                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"
                                    fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                    stroke-linejoin="round" class="lucide lucide-layout-dashboard h-4 w-4">
                                    <rect width="7" height="9" x="3" y="3" rx="1"></rect>
                                    <rect width="7" height="5" x="14" y="3" rx="1"></rect>
                                    <rect width="7" height="9" x="14" y="12" rx="1"></rect>
                                    <rect width="7" height="5" x="3" y="16" rx="1"></rect>
                                </svg>
                            </span><span>نظرة عامة</span></a></li>

                    <li><a href="pateins.html"><span class="icon-nav">
                                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"
                                    fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                    stroke-linejoin="round" class="lucide lucide-users h-5 w-5">
                                    <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"></path>
                                    <path d="M16 3.128a4 4 0 0 1 0 7.744"></path>
                                    <path d="M22 21v-2a4 4 0 0 0-3-3.87"></path>
                                    <circle cx="9" cy="7" r="4"></circle>
                                </svg>
                            </span><span>المرضى</span></a></li>
                    <li><a href="bills.html"><span class="icon-nav"><svg
                                    xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24"
                                    fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                    stroke-linejoin="round">
                                    <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                                    <polyline points="14 2 14 8 20 8"></polyline>
                                    <line x1="16" y1="13" x2="8" y2="13"></line>
                                    <line x1="16" y1="17" x2="8" y2="17"></line>
                                    <polyline points="10 9 9 9 8 9"></polyline>
                                </svg>
                            </span><span> الفواتير</span></a></li>
                    <li class="active"><a href="profile.html"><span class="icon-nav">
                                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"
                                    fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                    stroke-linejoin="round" class="lucide lucide-user h-4 w-4">
                                    <path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"></path>
                                    <circle cx="12" cy="7" r="4"></circle>
                                </svg>
                            </span><span>الملف الشخصي</span></a></li>
                </ul>
            </nav>
        </aside>
        <!-- end aside -->

        <main>


            <div class="profile-container">

                <div class="profile-header">
                    <div class="avatar-section">
                        <div class="avatar-circle" id="userInitials">ر</div>
                        <div class="avatar-info">
                            <h3 id="patientHeaderName">استقبال لافندر</h3>
                            <span class="role-badge" id="userRoleBadge">موظف/ة استقبال</span>
                        </div>
                    </div>
                    <h1>ملفكِ الشخصي</h1>
                    <p>إدارة بياناتكِ في لافندر</p>
                </div>

                <form id="profileForm">
                    <div class="form-grid">

                        <div class="form-group">
                            <label class="form-label" for="name">الاسم الكامل</label>
                            <input type="text" id="name" name="name" class="form-input"
                                placeholder="أدخل/ي اسمكِ الكامل" required="">
                        </div>

                        <div class="form-group">
                            <label class="form-label" for="phone">رقم الجوال</label>
                            <input type="tel" id="phone" name="phone" class="form-input" placeholder="+966 5X XXX XXXX"
                                required="">
                        </div>

                        <div class="form-group">
                            <label class="form-label" for="email">البريد الإلكتروني</label>
                            <input type="email" id="email" class="form-input"
                                style="background-color: #f5f5f5; cursor: not-allowed;" readonly="">
                        </div>







                    </div>

                    <div class="actions-section">
                        <button type="submit" class="btn-submit">حفظ التعديلات</button>
                    </div>
                </form>

            </div>
        </main>
    </div>
    <div id="toast" class="toast">تم تحديث ملفكِ الشخصي بنجاح!</div>
    <script>
        const menuToggle = document.querySelector('.menu-toggle');
        const closeMenu = document.querySelector('.close-menu');
        const sidebar = document.querySelector('aside');

        // فتح وإغلاق القائمة عند الضغط على زر الهامبرغر
        menuToggle.addEventListener('click', (e) => {
            sidebar.classList.toggle('open');
            e.stopPropagation(); // لمنع تضارب الحدث مع إغلاق القائمة عند الضغط بالخارج
        });

        // إغلاق القائمة عند الضغط على زر إكس (✕)
        closeMenu.addEventListener('click', () => {
            sidebar.classList.remove('open');
        });

        // ميزة إضافية: إغلاق القائمة تلقائياً عند الضغط في أي مكان خارجها (UX ممتاز)
        document.addEventListener('click', (e) => {
            if (!sidebar.contains(e.target) && sidebar.classList.contains('open')) {
                sidebar.classList.remove('open');
            }
        });
    </script>
    <script src="profile.js"></script>
</body>

</html>
